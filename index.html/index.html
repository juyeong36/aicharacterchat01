<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>월클 가보자고! - AI 아이돌 육성 채팅</title>
  <style>
    :root {
      --text: #f4f5ff;
      --sub: #b8bbd9;
      --purple: #7c5cff;
      --purple-dark: #6748ef;
      --purple-soft: rgba(124, 92, 255, 0.22);
      --pink: #ff62c8;
      --blue: #62c8ff;
      --mint: #8cffd1;
      --danger: #ff7f9d;
      --warning: #ffcf72;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
      --glow-pink: 0 0 0 1px rgba(255, 98, 200, 0.18), 0 0 24px rgba(255, 98, 200, 0.2);
      --glow-purple: 0 0 0 1px rgba(124, 92, 255, 0.2), 0 0 24px rgba(124, 92, 255, 0.26);
      --font: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: var(--font);
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 98, 200, 0.12), transparent 26%),
        radial-gradient(circle at 80% 10%, rgba(98, 200, 255, 0.12), transparent 22%),
        radial-gradient(circle at 50% 90%, rgba(124, 92, 255, 0.12), transparent 28%),
        linear-gradient(180deg, #05070f 0%, #090b14 40%, #06070d 100%);
      color: var(--text);
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: 375px;
      height: 812px;
      border-radius: 32px;
      overflow: hidden;
      position: relative;
      background: url("click-aihelper.png") center center / cover no-repeat;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      transition: background-image 0.5s ease;
    }

    /* (수정) 레벨별 배경 이미지 변경 */
    .app.level-2-up {
      background-image: url("click-aihelper2.png");
    }

    .app.level-3-up {
      background-image: url("click-aihelper3.png");
    }

    .app.level-4-up {
      background-image: url("click-aihelper4.png");
    }

    .app.level-5-up {
      background-image: url("click-aihelper5.png");
    }

    .app::before {
      content: "";
      position: absolute;
      inset: 0;
      background: transparent;
      pointer-events: none;
      z-index: 0;
    }

    .app > * {
      position: relative;
      z-index: 1;
    }

    .status-bar {
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px 0;
      color: rgba(255,255,255,0.92);
      font-size: 12px;
      letter-spacing: 0.2px;
      flex-shrink: 0;
      text-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .top-nav {
      padding: 10px 16px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .room-title {
      font-weight: 800;
      font-size: 20px;
      letter-spacing: -0.4px;
      color: #fff;
      text-shadow: 0 0 18px rgba(255, 98, 200, 0.25);
    }

    .diamond-chip {
      min-width: 96px;
      height: 40px;
      padding: 0 12px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255,255,255,0.3);
      box-shadow: 0 8px 30px rgba(255,255,255,0.15);
      font-weight: 800;
      font-size: 14px;
      flex-shrink: 0;
      backdrop-filter: blur(12px);
    }

    .diamond-icon {
      width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .diamond-icon svg {
      display: block;
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 10px rgba(98, 200, 255, 0.35));
    }

    .status-panel {
      margin: 0 14px;
      padding: 14px 14px 13px;
      border-radius: 22px;
      background:
        linear-gradient(145deg, rgba(21, 23, 42, 0.78), rgba(13, 15, 28, 0.68)),
        rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow:
        0 16px 40px rgba(0,0,0,0.20),
        inset 0 1px 0 rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      flex-shrink: 0;
      transition: box-shadow 0.3s ease, transform 0.3s ease;
    }

    .status-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .status-title {
      font-size: 13px;
      color: rgba(255,255,255,0.82);
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .level-badge {
      padding: 2px 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.18);
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      box-shadow: none;
      animation: badgePulse 2.8s ease-in-out infinite;
      white-space: nowrap;
    }

    @keyframes badgePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    .gauge-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.78);
    }

    .gauge-title strong {
      color: #fff;
      font-weight: 800;
    }

    .gauge-track {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      overflow: hidden;
      position: relative;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .gauge-track::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(255,255,255,0.05), transparent 35%, rgba(255,255,255,0.05));
      opacity: 0.6;
    }

    .gauge-fill {
      width: 18%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--pink), var(--purple), var(--blue));
      box-shadow: 0 0 20px rgba(124,92,255,0.45);
      transition: width 0.45s ease, box-shadow 0.35s ease;
      position: relative;
      overflow: hidden;
    }

    .gauge-fill.flash {
      box-shadow: 0 0 36px rgba(124, 92, 255, 0.78);
    }

    .gauge-fill::after {
      content: "";
      position: absolute;
      top: 0;
      left: -30%;
      width: 30%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
      transform: skewX(-18deg);
      animation: gaugeShine 2.6s linear infinite;
    }

    @keyframes gaugeShine {
      0% { left: -32%; }
      100% { left: 112%; }
    }

    .chat-area {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 10px 0 0;
      padding: 0 10px;
      overflow: hidden;
    }

    .event-card {
      display: none;
      border-radius: 20px;
      padding: 14px;
      background:
        linear-gradient(145deg, rgba(31, 20, 56, 0.84), rgba(19, 22, 42, 0.82)),
        rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow:
        0 12px 30px rgba(0,0,0,0.22),
        0 0 30px rgba(124,92,255,0.16);
      animation: slideDown 0.35s ease;
      flex-shrink: 0;
      margin: 0 4px;
      backdrop-filter: blur(10px);
    }

    .event-card.show {
      display: block;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .event-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .event-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.3px;
    }

    .event-tag.good { color: var(--mint); }
    .event-tag.bad { color: var(--danger); }
    .event-tag.special { color: #ffe28a; }

    .event-timer {
      font-size: 11px;
      color: rgba(255,255,255,0.65);
    }

    .event-title {
      margin-top: 10px;
      font-size: 15px;
      font-weight: 800;
      color: #fff;
    }

    .event-desc {
      margin-top: 6px;
      font-size: 12px;
      line-height: 1.45;
      color: rgba(255,255,255,0.82);
    }

    .messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 10px 2px 18px;
      scroll-behavior: smooth;
      -webkit-mask-image: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0) 0%,
        rgba(0, 0, 0, 1) 28px,
        rgba(0, 0, 0, 1) calc(100% - 56px),
        rgba(0, 0, 0, 0) 100%
      );
      mask-image: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0) 0%,
        rgba(0, 0, 0, 1) 28px,
        rgba(0, 0, 0, 1) calc(100% - 56px),
        rgba(0, 0, 0, 0) 100%
      );
    }

    .messages::-webkit-scrollbar {
      width: 6px;
    }

    .messages::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.18);
      border-radius: 999px;
    }

    .message-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      animation: popIn 0.24s ease;
    }

    @keyframes popIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-row.system {
      justify-content: center;
    }

    .bubble-avatar {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      flex-shrink: 0;
      background:
        url("profile.png") center center / cover no-repeat,
        linear-gradient(135deg, rgba(124,92,255,0.92), rgba(98,200,255,0.92));
      box-shadow: 0 6px 18px rgba(124,92,255,0.28);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
      transition: background-image 0.35s ease;
    }

    /* (수정) 레벨별 프로필 이미지 변경 */
    .bubble-avatar.level-2-up {
      background-image: url("profile2.png"), linear-gradient(135deg, rgba(124,92,255,0.92), rgba(98,200,255,0.92));
    }

    .bubble-avatar.level-3-up {
      background-image: url("profile3.png"), linear-gradient(135deg, rgba(124,92,255,0.92), rgba(98,200,255,0.92));
    }

    .bubble-avatar.level-4-up {
      background-image: url("profile4.png"), linear-gradient(135deg, rgba(124,92,255,0.92), rgba(98,200,255,0.92));
    }

    .bubble-avatar.level-5-up {
      background-image: url("profile5.png"), linear-gradient(135deg, rgba(124,92,255,0.92), rgba(98,200,255,0.92));
    }

    .bubble-group {
      max-width: 76%;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .bubble {
      position: relative;
      padding: 12px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.55;
      word-break: keep-all;
      white-space: pre-wrap;
      backdrop-filter: blur(8px);
      text-shadow: 0 1px 2px rgba(0,0,0,0.12);
    }

    .message-row.character .bubble {
      background:
        linear-gradient(145deg, rgba(31, 34, 58, 0.90), rgba(22, 24, 40, 0.82));
      border: 1px solid rgba(255,255,255,0.08);
      color: #f6f7ff;
      box-shadow: 0 12px 24px rgba(0,0,0,0.16);
      border-top-left-radius: 8px;
    }

    .message-row.user .bubble {
      background: var(--purple);
      color: white;
      box-shadow: 0 14px 28px rgba(124,92,255,0.28);
      border-top-right-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .message-row.system .bubble {
      max-width: 90%;
      background: rgba(255,255,255,0.16);
      border: 1px dashed rgba(255,255,255,0.22);
      color: rgba(255,255,255,0.92);
      text-align: center;
      font-size: 12px;
      padding: 10px 14px;
      border-radius: 999px;
      backdrop-filter: blur(6px);
    }

    .message-time {
      font-size: 10px;
      color: rgba(255,255,255,0.54);
      padding: 0 4px;
      align-self: flex-end;
      text-shadow: 0 1px 2px rgba(0,0,0,0.18);
    }

    .typing {
      display: none;
      align-items: center;
      gap: 4px;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.14);
      width: fit-content;
      margin: 0 0 8px 48px;
      flex-shrink: 0;
      backdrop-filter: blur(8px);
    }

    .typing.show {
      display: inline-flex;
    }

    .typing span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.82);
      animation: blink 1.1s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.25; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-2px); }
    }

    .composer-wrap {
      flex-shrink: 0;
      padding: 10px 12px 14px;
      background:
        linear-gradient(180deg, rgba(10,11,18,0) 0%, rgba(9,10,17,0.18) 20%, rgba(8,9,14,0.58) 42%, rgba(8,9,14,0.74) 100%);
    }

    .chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 10px;
      scroll-behavior: smooth;
    }

    .chips::-webkit-scrollbar {
      display: none;
    }

    .chip {
      flex: 0 0 auto;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.16);
      color: #ffffff;
      border-radius: 999px;
      padding: 11px 13px;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
      white-space: nowrap;
    }

    .chip:hover, .chip:active {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.22);
      border-color: rgba(255,255,255,0.2);
    }

    .composer {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 10px;
      border-radius: 24px;
      background:
        linear-gradient(145deg, rgba(20,22,37,0.88), rgba(15,16,26,0.84));
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow:
        0 10px 28px rgba(0,0,0,0.20),
        inset 0 1px 0 rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    textarea {
      width: 100%;
      min-height: 46px;
      max-height: 92px;
      resize: none;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.08);
      color: #fff;
      border-radius: 18px;
      padding: 13px 14px;
      font-size: 14px;
      line-height: 1.45;
      font-family: inherit;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
    }

    textarea::placeholder {
      color: rgba(255,255,255,0.56);
    }

    .send-btn {
      width: 48px;
      height: 48px;
      border: none;
      cursor: pointer;
      flex-shrink: 0;
      border-radius: 18px;
      background: var(--purple);
      color: white;
      box-shadow:
        0 16px 30px rgba(124,92,255,0.30),
        0 0 0 1px rgba(255,255,255,0.08);
      transition: transform 0.18s ease, filter 0.18s ease, background 0.18s ease;
      display: grid;
      place-items: center;
    }

    .send-btn:hover, .send-btn:active {
      transform: translateY(-1px) scale(1.02);
      filter: brightness(1.04);
      background: var(--purple-dark);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      filter: none;
    }

    .send-icon {
      width: 18px;
      height: 18px;
      display: block;
    }

    .toast-layer,
    .popup-layer,
    .sparkle-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .toast-layer {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 94px;
      z-index: 9;
    }

    .toast {
      transform: translateY(-12px);
      opacity: 0;
      padding: 12px 16px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.20), rgba(255,255,255,0.10));
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(12px);
      border-radius: 999px;
      box-shadow: 0 12px 24px rgba(0,0,0,0.18);
      font-size: 13px;
      font-weight: 700;
      color: white;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .popup-layer {
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 15;
      background: rgba(2,3,8,0.0);
      transition: background 0.3s ease;
      visibility: hidden;
    }

    .popup-layer.show {
      visibility: visible;
      background: rgba(2,3,8,0.40);
      pointer-events: auto;
    }

    .popup {
      width: 86%;
      border-radius: 28px;
      padding: 22px 18px 18px;
      background:
        linear-gradient(145deg, rgba(23,25,43,0.98), rgba(15,17,28,0.98));
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow:
        0 30px 60px rgba(0,0,0,0.38),
        0 0 40px rgba(124,92,255,0.12);
      transform: translateY(16px) scale(0.96);
      opacity: 0;
      transition: transform 0.28s ease, opacity 0.28s ease;
      text-align: center;
      position: relative;
      overflow: hidden;
      pointer-events: auto;
    }

    .popup-layer.show .popup {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    .popup::before {
      content: "";
      position: absolute;
      inset: auto -10% 68% -10%;
      height: 90px;
      background: radial-gradient(circle, rgba(124,92,255,0.22), transparent 65%);
      pointer-events: none;
    }

    .popup-icon {
      width: 70px;
      height: 70px;
      margin: 0 auto 14px;
      border-radius: 22px;
      display: grid;
      place-items: center;
      font-size: 30px;
      font-weight: 900;
      background:
        linear-gradient(145deg, rgba(124,92,255,0.30), rgba(98,200,255,0.18));
      box-shadow: var(--glow-purple);
    }

    .popup-title {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.6px;
      margin-bottom: 8px;
    }

    .popup-desc {
      font-size: 14px;
      line-height: 1.6;
      color: var(--sub);
      margin-bottom: 16px;
      white-space: pre-wrap;
    }

    .popup-reward {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      font-weight: 800;
      margin-bottom: 14px;
    }

    .popup-btn {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 18px;
      color: white;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      background: var(--purple);
      box-shadow: 0 14px 32px rgba(124,92,255,0.28);
    }

    .sparkle-layer {
      overflow: hidden;
      z-index: 13;
    }

    .sparkle {
      position: absolute;
      width: 10px;
      height: 10px;
      transform: rotate(45deg);
      background: linear-gradient(145deg, #ffffff, #6fd8ff);
      opacity: 0.95;
      border-radius: 2px;
      animation: sparkleFly 1.25s ease forwards;
      box-shadow: 0 0 14px rgba(255,255,255,0.7);
    }

    @keyframes sparkleFly {
      0% {
        transform: translate(0, 0) rotate(45deg) scale(0.4);
        opacity: 0;
      }
      15% { opacity: 1; }
      100% {
        transform: translate(var(--dx), var(--dy)) rotate(200deg) scale(1);
        opacity: 0;
      }
    }

    .level-boost {
      animation: levelGlow 0.9s ease;
    }

    @keyframes levelGlow {
      0% { box-shadow: 0 0 0 rgba(124,92,255,0); }
      30% { box-shadow: 0 0 0 4px rgba(124,92,255,0.18), 0 0 36px rgba(124,92,255,0.4); }
      100% { box-shadow: 0 0 0 rgba(124,92,255,0); }
    }

    .shake {
      animation: shake 0.42s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-4px); }

    function randomOf(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function pickUnique(arr, count = 4) {
      return shuffle([...new Set(arr)]).slice(0, count);
    }

    function hasSeenEvent(eventId) {
      return state.shownEventIds.includes(eventId);
    }

    function markEventSeen(eventId) {
      if (!hasSeenEvent(eventId)) state.shownEventIds.push(eventId);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function nowTime() {
      const d = new Date();
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      return `${hh}:${mm}`;
    }

    function includesAny(text, keywords) {
      const normalized = text.toLowerCase();
      return keywords.some(word => normalized.includes(word.toLowerCase()));
    }

    function getToneGroup() {
      if (state.levelIndex >= 3 || state.moodScore >= 28) return "high";
      if (state.levelIndex >= 1 || state.moodScore >= 6) return "mid";
      return "low";
    }

    function getLastUserMessage() {
      for (let i = state.history.length - 1; i >= 0; i--) {
        if (state.history[i].type === "user") return state.history[i].text;
      }
      return "";
    }

    function getLastIntent() {
      for (let i = state.history.length - 1; i >= 0; i--) {
        if (state.history[i].meta && state.history[i].meta.intent) return state.history[i].meta.intent;
      }
      return "neutral";
    }

    /* (수정 핵심) 현재 레벨에 따라 배경/프로필 이미지 교체 */
    function applyVisualStage() {
      const appLevelClasses = ["level-2-up", "level-3-up", "level-4-up", "level-5-up"];
      const avatarLevelClasses = ["level-2-up", "level-3-up", "level-4-up", "level-5-up"];

      appEl.classList.remove(...appLevelClasses);

      if (state.levelIndex >= 4) appEl.classList.add("level-5-up");
      else if (state.levelIndex >= 3) appEl.classList.add("level-4-up");
      else if (state.levelIndex >= 2) appEl.classList.add("level-3-up");
      else if (state.levelIndex >= 1) appEl.classList.add("level-2-up");

      document.querySelectorAll(".bubble-avatar").forEach(avatar => {
        avatar.classList.remove(...avatarLevelClasses);

        if (state.levelIndex >= 4) avatar.classList.add("level-5-up");
        else if (state.levelIndex >= 3) avatar.classList.add("level-4-up");
        else if (state.levelIndex >= 2) avatar.classList.add("level-3-up");
        else if (state.levelIndex >= 1) avatar.classList.add("level-2-up");
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function addMessage(type, text, options = {}) {
      if (type === "character" && text === state.lastCharacterReply) return;

      state.history.push({
        type,
        text,
        meta: options.meta || null
      });

      const row = document.createElement("div");
      row.className = `message-row ${type}`;

      if (type === "system") {
        row.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
      } else if (type === "character") {
        row.classList.add("character");
        row.innerHTML = `
          <div class="bubble-avatar ${
            state.levelIndex >= 4 ? "level-5-up" :
            state.levelIndex >= 3 ? "level-4-up" :
            state.levelIndex >= 2 ? "level-3-up" :
            state.levelIndex >= 1 ? "level-2-up" : ""
          }"></div>
          <div class="bubble-group">
            <div class="bubble">${escapeHtml(text)}</div>
            <div class="message-time">${options.time || nowTime()}</div>
          </div>
        `;
        state.lastCharacterReply = text;
      } else {
        row.innerHTML = `
          <div class="bubble-group">
            <div class="bubble">${escapeHtml(text)}</div>
            <div class="message-time">${options.time || nowTime()}</div>
          </div>
        `;
      }

      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function renderChips(items) {
      const key = items.join("|");
      if (state.lastRecommendationsKey === key) return;
      state.lastRecommendationsKey = key;

      chipsEl.innerHTML = "";
      items.forEach(text => {
        const btn = document.createElement("button");
        btn.className = "chip";
        btn.textContent = text;
        btn.addEventListener("click", () => {
          inputEl.value = text;
          autoResizeTextarea();
          sendMessage();
        });
        chipsEl.appendChild(btn);
      });
    }

    function updateUI(flashGauge = false) {

      const percent = clamp(Math.round(state.progress), 0, 100);

      if (flashGauge) {
        gaugeFillEl.classList.add("flash");
        setTimeout(() => gaugeFillEl.classList.remove("flash"), 600);

      applyVisualStage();
    }

    let toastTimer = null;

      clearTimeout(toastTimer);
      toastEl.textContent = text;
      toastEl.classList.add("show");
      toastTimer = setTimeout(() => toastEl.classList.remove("show"), 1800);

    function showPopup({ icon = "★", title, desc, rewardText = "" }) {

      popupTitleEl.textContent = title;

      if (rewardText) {

    function createSparkles(count = 18) {
      const rect = diamondChipEl.getBoundingClientRect();
      const appRect = appEl.getBoundingClientRect();

      for (let i = 0; i < count; i++) {
        const s = document.createElement("div");
        s.className = "sparkle";

        const startX = rect.left - appRect.left + rect.width / 2;
        const startY = rect.top - appRect.top + rect.height / 2;

        const dx = `${(Math.random() - 0.5) * 180}px`;
        const dy = `${(Math.random() - 0.5) * 140 - 20}px`;

        s.style.left = `${startX}px`;
        s.style.top = `${startY}px`;
        s.style.setProperty("--dx", dx);
        s.style.setProperty("--dy", dy);
        s.style.animationDelay = `${Math.random() * 0.15}s`;

        sparkleLayerEl.appendChild(s);
        setTimeout(() => s.remove(), 1300);
      }
    }

    function tokenizeKorean(text) {
      return text
        .replace(/[^\w가-힣\s]/g, " ")
        .split(/\s+/)
        .map(word => word.trim())
        .filter(word => word.length >= 2);
    }

    function extractMeaningfulKeyword(text) {
      const stopwords = [
        "오늘", "진짜", "그냥", "조금", "너무", "근데", "그리고", "나는", "루미", "이거", "저거",
        "정말", "약간", "계속", "뭔가", "이제", "지금", "하면", "해서", "하는", "같아", "느낌", "생각"
      ];

      const words = tokenizeKorean(text).filter(word => !stopwords.includes(word));
      if (!words.length) return "";

      const priorityKeywords = [
        "연습", "무대", "보컬", "안무", "표정", "데뷔", "평가", "팬", "직캠", "라이브", "센터", "실수",
        "불안", "걱정", "악플", "루머", "컨디션", "고음", "화보", "컬래버", "월드투어", "글로벌"
      ];

      const priority = words.find(word => priorityKeywords.some(key => word.includes(key) || key.includes(word)));
      return priority || words[0];
    }

    function buildKeywordEcho(text) {
      const keyword = extractMeaningfulKeyword(text);
      if (!keyword) return "";

      const templates = [
        `${keyword} 얘기 꺼내니까 괜히 더 신경 쓰여...`,
        `${keyword} 쪽이 계속 마음에 남아...`,
        `${keyword} 얘긴 나도 쉽게 넘기기 어렵더라...`
      ];

      return randomOf(templates);
    }

    function updateMemoryFromUserText(text, analysis) {
      const keyword = extractMeaningfulKeyword(text);
      if (keyword) {
        state.memory.lastTopic = keyword;
        state.memory.recentUserKeywords.unshift(keyword);
        state.memory.recentUserKeywords = [...new Set(state.memory.recentUserKeywords)].slice(0, 5);

        state.memory.favoriteKeywords.push(keyword);
        state.memory.favoriteKeywords = state.memory.favoriteKeywords.slice(-12);
      }

      state.memory.lastEmotion = analysis.intent;
      state.memory.intimacy = clamp(state.memory.intimacy + (analysis.intent === "comfort" || analysis.intent === "praise" ? 3 : 1), 0, 100);

      if (analysis.intent === "comfort" || analysis.intent === "growth" || analysis.intent === "praise") {
        state.memory.sharedMoments.unshift(text);
        state.memory.sharedMoments = state.memory.sharedMoments.slice(0, 4);
      }
    }

    function maybeReferenceMemory(currentText) {
      const keyword = extractMeaningfulKeyword(currentText);
      const lastTopic = state.memory.lastTopic;
      if (!lastTopic) return "";
      if (keyword && keyword === lastTopic) return "";
      if (Math.random() > 0.45) return "";

      const lines = [
        `아까 ${lastTopic} 얘기한 것도 계속 남아 있었어...`,
        `그리고 조금 전 ${lastTopic} 얘기도 자꾸 생각나...`
      ];
      return randomOf(lines);
    }

    function applyCharacterStyle(text) {
      let styled = text
        .replace(/\s+/g, " ")
        .replace(/…/g, "...")
        .trim();

      styled = styled
        .replace(/습니다\.?/g, "...")
        .replace(/어요\.?/g, "어...")
        .replace(/에요\.?/g, "야...");

      if (!/[.!?…]$/.test(styled)) styled += "...";
      styled = styled.replace(/\.{4,}/g, "...");
      return styled;
    }

    function composeReplyParts(userText, analysis) {
      const primary = applyCharacterStyle(generateCharacterReply(userText, analysis));
      const parts = [primary];

      const memoryLine = maybeReferenceMemory(userText);
      if (memoryLine && Math.random() > 0.35) parts.push(applyCharacterStyle(memoryLine));

      if (!state.currentEvent && Math.random() > 0.42) {
        const followups = {
          comfort: [
            "오늘은 너무 혼자 버티지 않았으면 좋겠어...",
            "조금만 더 얘기해주면, 나도 마음 정리해볼 수 있을 것 같아..."
          ],
          growth: [
            "이번엔 진짜 흐름 놓치고 싶지 않아...",
            "네가 그렇게 말해주면 조금 더 해볼 용기가 나..."
          ],
          praise: [
            "그 말 들으면 괜히 더 잘하고 싶어져...",
            "괜히 심장이 빨라져... 그래도 좋다..."
          ],
          question: [
            "이런 얘기 물어봐주는 거, 생각보다 되게 고마워...",
            "나도 조금 더 솔직하게 말해봐도 될 것 같아..."
          ],
          negative: [
            "그래도 네 앞에선 완전히 무너지고 싶진 않아...",
            "지금은 좀 흔들려도, 도망치고 싶진 않아..."
          ],
          neutral: [
            "조금 더 같이 있어줄래...",
            "네 말은 이상하게 오래 남아..."
          ]
        };

        const pool = followups[analysis.intent] || followups.neutral;
        parts.push(applyCharacterStyle(randomOf(pool)));
      }

      return parts.slice(0, 2);
    }

    function analyzeText(text) {
      const normalized = text.trim().toLowerCase();
      let positiveScore = 0;
      let negativeScore = 0;

      POSITIVE_WORDS.forEach(word => {
        if (normalized.includes(word.toLowerCase())) positiveScore += 1;
      });

      NEGATIVE_WORDS.forEach(word => {
        if (normalized.includes(word.toLowerCase())) negativeScore += 1;
      });

      if (normalized.includes("!")) positiveScore += 0.5;
      if (normalized.includes("?")) negativeScore += 0.2;
      if (normalized.length <= 5) negativeScore += 0.1;

      let intent = "neutral";

      if (includesAny(normalized, INTENT.giveup)) intent = "negative";
      else if (includesAny(normalized, INTENT.comfort)) intent = "comfort";
      else if (includesAny(normalized, INTENT.growth)) intent = "growth";
      else if (includesAny(normalized, INTENT.praise)) intent = "praise";
      else if (includesAny(normalized, INTENT.question)) intent = "question";
      else if (positiveScore > negativeScore) intent = "growth";
      else if (negativeScore > positiveScore) intent = "negative";

      return { positiveScore, negativeScore, intent };
    }

    function applyConversationEffects(analysis) {
      const { positiveScore, negativeScore, intent } = analysis;

      let good = 0;
      let bad = 0;
      let progressDelta = 0;
      let moodDelta = 0;

      switch (intent) {
        case "comfort":
          good += 1;
          progressDelta += 10;
          moodDelta += 10;
          break;
        case "growth":
          good += 1;
          progressDelta += 12;
          moodDelta += 8;
          break;
        case "praise":
          good += 1;
          progressDelta += 9;
          moodDelta += 9;
          break;
        case "question":
          progressDelta += 5;
          moodDelta += 2;
          break;
        case "negative":
          bad += 1;
          progressDelta -= 10;
          moodDelta -= 9;
          break;
        default:
          progressDelta += 3;
          moodDelta += 1;
      }

      if (positiveScore >= 2) {
        good += 1;
        progressDelta += 6;
        moodDelta += 4;
      }
      if (negativeScore >= 2) {
        bad += 1;
        progressDelta -= 6;
        moodDelta -= 4;
      }

      state.goodMoments += good;
      state.badMoments += bad;
      state.progress = clamp(state.progress + progressDelta, 0, 100);
      state.moodScore = clamp(state.moodScore + moodDelta, -50, 60);

      return { good, bad, intent };
    }

    function getLevelUpDesc(levelName) {
      const map = {
        "Level 2. 데뷔조 발탁": "루미가 드디어 데뷔조에 발탁됐어요.\n배경과 프로필 이미지가 새로운 단계에 맞게 변경됩니다.",
        "Level 3. 신인 아이돌": "루미가 신인 아이돌 단계에 진입했어요.\n무대를 통해 자기 색을 보여주는 감각이 점점 살아나고 있어요.",
        "Level 4. 인기 아이돌": "루미가 인기 아이돌 단계에 올랐어요.\n팬 반응과 무대 존재감을 스스로 끌어올리는 힘이 생기고 있어요.",
        "Level 5. 월클 아이돌": "루미가 마침내 월클 아이돌 단계에 도달했어요.\n이제는 더 넓은 무대와 더 큰 꿈을 당당하게 바라볼 수 있어요."
      };
      return map[levelName] || "루미가 한 단계 성장했어요.";
    }

    function checkLevelTransitions() {
      if (state.progress >= 100 && state.levelIndex < state.levels.length - 1) {
        state.progress = state.progress - 100;
        state.levelIndex += 1;

        const reward = state.levels[state.levelIndex].reward;
        state.diamonds += reward;

        applyVisualStage();

        heroCardEl.classList.add("level-boost");
        setTimeout(() => heroCardEl.classList.remove("level-boost"), 900);

        createSparkles(24);
        showPopup({
          icon: "⬆",
          title: "레벨 업!",
          desc: getLevelUpDesc(state.levels[state.levelIndex].name),
          rewardText: `+${reward} 다이아 획득`
        });
        showToast(`레벨 업! ${state.levels[state.levelIndex].name}`);
        addMessage("system", `${state.characterName}가 ${state.levels[state.levelIndex].name} 단계로 성장했어요!`);
        return;
      }

      if (state.progress <= 8 && state.badMoments >= state.goodMoments + 2 && state.levelIndex > 0) {
        state.levelIndex -= 1;
        state.progress = 35;

        applyVisualStage();

        heroCardEl.classList.add("shake");
        setTimeout(() => heroCardEl.classList.remove("shake"), 420);

        showPopup({
          icon: "↓",
          title: "레벨 다운",
          desc: `흐름이 흔들리며 ${state.characterName}의 단계가 "${state.levels[state.levelIndex].name}"(으)로 내려갔어요.\n다시 좋은 순간을 쌓아 회복해보세요.`,
          rewardText: ""
        });
        showToast("레벨 다운... 멘탈 관리가 필요해요");
        addMessage("system", `${state.characterName}가 흔들리며 한 단계 내려갔어요.`);
      }
    }

    function maybeTriggerEvent() {
      if (state.currentEvent) return;
      if (state.messageCount < 2) return;

      const chance = Math.random();
      if (chance > 0.36) return;

      const available = EVENTS.filter(event => event.level === state.levelIndex && !hasSeenEvent(event.id));
      if (!available.length) return;

      const eventTypeBias = Math.random() < 0.5 ? "good" : "bad";
      const typeMatched = available.filter(event => event.type === eventTypeBias || (eventTypeBias === "good" && event.type === "special"));
      const event = randomOf(typeMatched.length ? typeMatched : available);

      markEventSeen(event.id);
      state.currentEvent = event;

      eventTagEl.className = "event-tag";
      if (event.type === "good") eventTagEl.classList.add("good");
      if (event.type === "bad") eventTagEl.classList.add("bad");
      if (event.type === "special") eventTagEl.classList.add("special");

      eventTagEl.textContent =
        event.type === "good" ? "GROWTH EVENT" :
        event.type === "bad" ? "CRISIS EVENT" :
        "SPECIAL EVENT";

      eventTitleEl.textContent = event.title;
      eventDescEl.textContent = event.desc;
      eventTimerEl.textContent = "이벤트 진행 중";
      eventCardEl.classList.add("show");

      scheduleCharacterReply([randomOf(event.intro), Math.random() > 0.55 ? "네 생각 먼저 듣고 싶어..." : ""].filter(Boolean), 650);
      renderChips(pickUnique(event.recommendations, 4));
      showToast("랜덤 이벤트 발생!");
    }

    function resolveEvent(userText) {
      if (!state.currentEvent) return false;

      const result = state.currentEvent.resolve(userText);

      state.goodMoments += result.good;
      state.badMoments += result.bad;
      state.diamonds += result.diamonds;
      state.progress = clamp(
        state.progress + (result.good * 10) - (result.bad * 9) + (result.diamonds > 0 ? 5 : 0),
        0, 100
      );
      state.moodScore = clamp(
        state.moodScore + (result.good * 8) - (result.bad * 8) + (result.diamonds > 0 ? 3 : 0),
        -50, 60
      );

      if (result.diamonds > 0) createSparkles(18);

      scheduleCharacterReply([applyCharacterStyle(result.reply), Math.random() > 0.5 ? applyCharacterStyle("이번 선택, 나한텐 꽤 크게 남을 것 같아...") : ""].filter(Boolean), 620);
      if (result.toast) showToast(result.toast);

      addMessage("system", `${state.currentEvent.title} 종료`);
      state.currentEvent = null;
      eventCardEl.classList.remove("show");

      updateUI(true);
      checkLevelTransitions();
      updateRecommendations();

      return true;
    }

    function generateCharacterReply(userText, analysis) {
      const toneGroup = getToneGroup();
      const toneSet = TONE_LINES[toneGroup];

      let replyPool = toneSet.neutral;

      switch (analysis.intent) {
        case "comfort":
          replyPool = toneSet.comfort;
          break;
        case "growth":
          replyPool = toneSet.growth;
          break;
        case "praise":
          replyPool = toneSet.praise;
          break;
        case "question":
          replyPool = toneSet.question;
          break;
        case "negative":
          replyPool = toneSet.negative;
          break;
      }

      const segments = [];
      const keywordEcho = buildKeywordEcho(userText);
      if (keywordEcho) segments.push(keywordEcho);

      let coreReply = randomOf(replyPool);

      if (analysis.intent === "question" && includesAny(userText, ["팬", "반응"])) {
        coreReply += " 반응이 신경 쓰이긴 하지만, 이제는 조금 기대하게 되는 것 같아.";
      }

      if (analysis.intent === "question" && includesAny(userText, ["오늘", "연습"])) {
        coreReply += " 특히 표정이랑 호흡에서 더 잡아야 할 부분이 보였어.";
      }

      if (analysis.intent === "praise" && state.levelIndex >= 2) {
        coreReply += " 다음엔 더 자신 있게 보여줄게.";
      }

      if (analysis.intent === "growth" && state.levelIndex >= 3) {
        coreReply += " 이제는 더 큰 무대도 욕심내보고 싶어.";
      }

      if (analysis.intent === "negative" && state.moodScore < -15) {
        coreReply += " 그래도... 완전히 포기하고 싶진 않아.";
      }

      if (state.memory.intimacy >= 24 && Math.random() > 0.45) {
        coreReply += " 너한텐 조금 더 솔직하게 말하게 돼.";
      }

      segments.push(coreReply);

      return applyCharacterStyle(segments.join(" "));
    }

    function scheduleCharacterReply(text, delay = 700, options = {}) {
      const parts = Array.isArray(text) ? text.filter(Boolean) : [text].filter(Boolean);
      if (!parts.length) return;

      let totalDelay = Math.max(250, delay + Math.floor(Math.random() * 240));
      typingIndicator.classList.add("show");
      messagesEl.scrollTop = messagesEl.scrollHeight;

      parts.forEach((part, index) => {
        const cleanPart = applyCharacterStyle(part);
        const partDelay = totalDelay + index * (620 + Math.floor(Math.random() * 260));

        setTimeout(() => {
          addMessage("character", cleanPart, { meta: options.meta || null });
          messagesEl.scrollTop = messagesEl.scrollHeight;

          const isLast = index === parts.length - 1;
          if (isLast) {
            typingIndicator.classList.remove("show");
          }
        }, partDelay);
      });
    }

    function updateRecommendations() {
      if (state.currentEvent) {
        renderChips(pickUnique(state.currentEvent.recommendations, 4));
        return;
      }

      const lastIntent = getLastIntent();
      const lastUserMessage = getLastUserMessage();
      let pool = [];

      if (state.messageCount <= 1) pool.push(...RECOMMENDATION_POOLS.start);
      if (state.moodScore <= -18) pool.push(...RECOMMENDATION_POOLS.lowMood);
      if (state.moodScore > -18 && state.moodScore < 10) pool.push(...RECOMMENDATION_POOLS.recovery);

      if (lastIntent === "question") pool.push(...RECOMMENDATION_POOLS.question);
      if (lastIntent === "comfort" || lastIntent === "negative") pool.push(...RECOMMENDATION_POOLS.lowMood, ...RECOMMENDATION_POOLS.recovery);
      if (lastIntent === "praise") pool.push(...RECOMMENDATION_POOLS.praise);
      if (lastIntent === "growth") pool.push(...RECOMMENDATION_POOLS.praise);

      if (state.levelIndex === 0) pool.push(...RECOMMENDATION_POOLS.level1);
      if (state.levelIndex === 1) pool.push(...RECOMMENDATION_POOLS.level2);
      if (state.levelIndex === 2) pool.push(...RECOMMENDATION_POOLS.level3);
      if (state.levelIndex === 3) pool.push(...RECOMMENDATION_POOLS.level4);
      if (state.levelIndex === 4) pool.push(...RECOMMENDATION_POOLS.level5);

      if (includesAny(lastUserMessage, ["연습", "오늘"])) {
        pool.push(
          "오늘 연습에서 가장 아쉬웠던 건 뭐야?",
          "오늘은 어떤 부분이 조금 나아졌어?",
          "연습하면서 제일 떨렸던 순간은 언제였어?",
          "오늘 감정이 올라간 지점이 있었어?"
        );
      }

      if (includesAny(lastUserMessage, ["실수", "망", "불안", "걱정"])) {
        pool.push(
          "실수는 성장 과정에 꼭 있는 장면이야",
          "지금은 결과보다 회복이 먼저야",
          "불안할수록 더 천천히 가보자",
          "한 장면 때문에 전체를 판단하지 말자"
        );
      }

      if (includesAny(lastUserMessage, ["데뷔", "평가", "발탁"])) {
        pool.push(
          "이번 평가가 네 흐름을 바꿀 수 있어",
          "데뷔조 발탁, 충분히 가능해 보여",
          "이번엔 피하지 말고 보여주자",
          "네 이름이 불릴 만한 준비가 돼 있어"
        );
      }

      if (includesAny(lastUserMessage, ["팬", "직캠", "인기"])) {
        pool.push(
          "팬들이 네 매력을 보기 시작한 거야",
          "지금 반응은 네가 만든 결과야",
          "좋은 반응을 자신감으로 바꿔보자",
          "이 흐름이면 더 큰 반응도 가능해"
        );
      }

      if (includesAny(lastUserMessage, ["월클", "글로벌", "해외"])) {
        pool.push(
          "이번엔 크게 꿈꿔도 괜찮아",
          "글로벌 무대도 충분히 어울릴 수 있어",
          "네 가능성을 더 넓게 보자",
          "월클은 먼 얘기만은 아닐 수도 있어"
        );
      }

      if (pool.length < 4) {
        pool.push(
          ...RECOMMENDATION_POOLS.start,
          ...RECOMMENDATION_POOLS.question,
          ...RECOMMENDATION_POOLS.level1,
          ...RECOMMENDATION_POOLS.level2,
          ...RECOMMENDATION_POOLS.level3
        );
      }

      renderChips(pickUnique(pool, 4));
    }

    function autoResizeTextarea() {
      inputEl.style.height = "46px";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 92) + "px";
      sendBtn.disabled = inputEl.value.trim().length === 0;
    }

    inputEl.addEventListener("input", autoResizeTextarea);

    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      addMessage("user", text);
      inputEl.value = "";
      autoResizeTextarea();
      state.messageCount += 1;

      const eventHandled = resolveEvent(text);
      if (eventHandled) {
        updateRecommendations();
        return;
      }

      const analysis = analyzeText(text);
      updateMemoryFromUserText(text, analysis);
      const result = applyConversationEffects(analysis);
      state.history[state.history.length - 1].meta = { intent: analysis.intent, keyword: state.memory.lastTopic || "" };

      if (result.good > 0 && result.bad === 0) showToast(`좋은 순간 +${result.good}`);
      else if (result.bad > 0 && result.good === 0) showToast(`나쁜 순간 +${result.bad}`);
      else if (result.good > 0 && result.bad > 0) showToast(`좋은 순간 +${result.good}, 나쁜 순간 +${result.bad}`);

      updateUI(true);

      const replyParts = composeReplyParts(text, analysis);
      scheduleCharacterReply(replyParts, 650, { meta: { intent: analysis.intent } });

      setTimeout(() => {
        checkLevelTransitions();
        updateUI();
        updateRecommendations();
        maybeTriggerEvent();
      }, 740);
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function init() {
      applyVisualStage();
      updateUI();
      autoResizeTextarea();

      addMessage("system", "루미와의 육성 채팅이 시작되었어요. 좋은 순간을 쌓아 Level 5. 월클 아이돌까지 성장시켜 보세요.");

      setTimeout(() => addMessage("character", "안녕... 오늘도 와줘서 고마워."), 280);
      setTimeout(() => {
        scheduleCharacterReply([randomOf(TONE_LINES.low.intro), "오늘은 어떤 하루였는지 조금 궁금했어..."], 180);
        updateRecommendations();
      }, 950);
    }

    init();
  </script>
</body>
</html>
